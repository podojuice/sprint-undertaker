services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rpg
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpg"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rpg_test
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpg_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file:
      - .env
    environment:
      RPG_DATABASE_URL: ${RPG_DATABASE_URL:-postgresql+asyncpg://rpg:rpg@db:5432/rpg}
      RPG_HOST: ${RPG_HOST:-0.0.0.0}
      RPG_PORT: ${RPG_PORT:-8000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app/server
    command:
      [
        "uvicorn",
        "server.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--log-config",
        "log_config.json"
      ]

volumes:
  pgdata:
